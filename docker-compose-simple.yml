version: '3.8'

services:
  # HiveMQ Community Edition - MQTT Broker
  hivemq:
    image: hivemq/hivemq-ce:2024.1
    container_name: hivemq-broker
    ports:
      - "1883:1883"      # MQTT
      - "8883:8883"      # MQTT over TLS
      - "8080:8080"      # Control Center
    networks:
      - iot-network
    restart: unless-stopped

  # ThingsBoard Community Edition
  thingsboard:
    image: thingsboard/tb-postgres:3.7.0
    container_name: thingsboard
    ports:
      - "9090:9090"      # HTTP
      - "1885:1883"      # MQTT
    environment:
      - TB_QUEUE_TYPE=in-memory
    networks:
      - iot-network
    restart: unless-stopped

  # Node-RED Gateway Floor 01
  gateway-floor-01:
    image: nodered/node-red:3.1.3
    container_name: gateway-floor-01
    ports:
      - "1881:1880"
    environment:
      - NODE_NAME=floor-01
      - FLOOR_NUMBER=01
    volumes:
      - ./node-red-flows/floor-01:/data
    networks:
      - iot-network
    restart: unless-stopped

  # Node-RED Gateway Floor 02
  gateway-floor-02:
    image: nodered/node-red:3.1.3
    container_name: gateway-floor-02
    ports:
      - "1882:1880"
    environment:
      - NODE_NAME=floor-02
      - FLOOR_NUMBER=02
    volumes:
      - ./node-red-flows/floor-02:/data
    networks:
      - iot-network
    restart: unless-stopped

  # Node-RED Gateway Floor 03
  gateway-floor-03:
    image: nodered/node-red:3.1.3
    container_name: gateway-floor-03
    ports:
      - "1883:1880"
    environment:
      - NODE_NAME=floor-03
      - FLOOR_NUMBER=03
    volumes:
      - ./node-red-flows/floor-03:/data
    networks:
      - iot-network
    restart: unless-stopped

networks:
  iot-network:
    driver: bridge
